<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <script>
    // Prevent flash of wrong theme — runs before CSS loads
    (function () {
      var t = localStorage.getItem('infobot_theme');
      if (t === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/InfoAcademy.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="InfoAcademy — Assistant pédagogique IA intelligent pour l'apprentissage de l'informatique, la programmation et les structures de données." />
  <meta name="keywords"
    content="informatique, programmation, IA, chatbot, apprentissage, Python, Java, C, SQL, algorithmes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <title>InfoAcademy</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
